<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NexLearn</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#FDF8F3]">

    <!-- Login Section -->

    <section id="login-page" class="min-h-screen flex items-center justify-center px-6 py-10">

        <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden  ">

            <div class="grid lg:grid-cols-2">

                <!-- Left Side -->

                <div class="hidden lg:flex items-center justify-center bg-lime-100 py-10">

                    <img src="images/login.png"
                        alt="Login Image"
                        class="w-[400px] object-contain">

                </div>

                <!-- Right Side -->

                <div class="p-8 md:p-12">

                    <!-- Logo -->

                    <h2 class="text-3xl font-bold text-lime-600">
                        NexLearn
                    </h2>

                    <h1 class="text-4xl font-bold text-gray-800 mt-6">
                        Welcome Back 👋
                    </h1>

                    <p class="text-gray-500 mt-3">
                        Sign in to continue your learning journey.
                    </p>

                    <!-- Login Form -->

                    <form id="loginForm" class="mt-8 space-y-6">

                        <!-- Email -->

                        <div>

                            <label class="block font-medium mb-2">
                                Email Address
                            </label>

                            <input
                                id="email"
                                type="email"
                                placeholder="Enter your email"
                                class="w-full border rounded-lg px-4 py-3 outline-none focus:border-lime-500">

                        </div>

                        <!-- Password -->

                        <div>

                            <label class="block font-medium mb-2">
                                Password
                            </label>

                            <input
                                id="password"
                                type="password"
                                placeholder="Enter your password"
                                class="w-full border rounded-lg px-4 py-3 outline-none focus:border-lime-500">

                        </div>

                        <!-- Remember & Forgot -->

                        <div class="flex justify-between items-center">

                            <label class="flex items-center gap-2">

                                <input
                                    id="rememberMe"
                                    type="checkbox">

                                Remember Me

                            </label>

                            <a
                                id="forgotPasswordLink"
                                href="forgot-password.html"
                                class="text-lime-600 hover:underline">

                                Forgot Password?

                            </a>

                        </div>

                        <!-- Login Button -->

                        <button
                            id="loginBtn"
                            type="submit"
                            class="w-full bg-lime-500 hover:bg-lime-600 transition py-3 rounded-lg font-semibold">

                            Login

                        </button>

                    </form>

                    <!-- Register -->

                    <p class="text-center mt-8 text-gray-600">

                        Don't have an account?

                        <a
                            id="registerLink"
                            href="register.html"
                            class="text-lime-600 font-semibold hover:underline">

                            Register

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
