<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NexLearn</title>

        <script src="https://cdn.tailwindcss.com"></script>

        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
            rel="stylesheet">

        <style>
        body{
            font-family:'Poppins',sans-serif;
        }
    </style>
    </head>

    <body class="bg-[#FDF8F3]">

        <nav class="bg-[#FDF8F3] shadow-sm border-b">

            <div
                class="max-w-7xl mx-auto flex items-center justify-between px-8 py-4">

                <!-- Logo -->

                <div class="flex items-center gap-3">

                    <img src="logo.png" class="w-10">

                    <h1 class="text-3xl font-bold">

                        <span class="text-green-900">Nex</span><span

                    </h1>

                </div>

                <ul
                    class="hidden lg:flex items-center gap-10 text-gray-700 font-medium">

                    <li><a href="#"
                            class="hover:text-green-600 transition">Home</a></li>

                    <li><a href="#"
                            class="hover:text-green-600 transition">Courses</a></li>

                    <li><a href="#"
                            class="hover:text-green-600 transition">Categories</a></li>

                    <li><a href="#"
                            class="hover:text-green-600 transition">Instructors</a></li>

                    <li><a href="#"
                            class="hover:text-green-600 transition">About</a></li>

                    <li><a href="#"
                            class="hover:text-green-600 transition">Contact</a></li>

                </ul>

                <!-- Buttons -->

                <div class="flex items-center gap-4">

                    <button
                        class="text-gray-700 font-medium hover:text-green-600">

                        Login

                    </button>

                    <button
                        class="bg-lime-500 hover:bg-lime-600 text-black font-semibold px-6 py-3 rounded-lg transition">

                        Sign Up

                    </button>

                </div>

            </div>

        </nav>
